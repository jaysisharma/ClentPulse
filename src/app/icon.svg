<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <!-- Vibrant, high-contrast gradient from electric violet to bright magenta -->
    <linearGradient id="main-grad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5" /> <!-- Royal Indigo -->
      <stop offset="60%" stop-color="#8b5cf6" /> <!-- Vibrant Violet -->
      <stop offset="100%" stop-color="#ec4899" /> <!-- Bright Pink/Magenta -->
    </linearGradient>
    <!-- Gradient for middle arm (Electric Cyan to Neon Green/Light Blue) -->
    <linearGradient id="mid-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f2fe" /> <!-- Neon Cyan -->
      <stop offset="100%" stop-color="#3b82f6" /> <!-- Bright Blue -->
    </linearGradient>
    <!-- Shadow with high contrast opacity to pop on both light/dark -->
    <filter id="layer-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="-1" dy="1.5" stdDeviation="2" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Left Stem & Top Arm (Main Body) -->
  <path d="M 28 82 
           V 28 
           C 28 20, 34 14, 42 14 
           H 70 
           C 74 14, 77 17, 77 21 
           C 77 25, 74 28, 70 28 
           H 42 
           V 82 
           C 42 86, 39 89, 35 89 
           C 31 89, 28 86, 28 82 Z" 
        fill="url(#main-grad)" />

  <!-- Middle Arm (Layered overlapping pill shape with shadow) -->
  <rect x="35" y="46" width="28" height="14" rx="7" 
        fill="url(#mid-grad)" 
        filter="url(#layer-shadow)" />
</svg>
